<svg xmlns="http://www.w3.org/2000/svg" width="860" height="360" viewBox="0 0 860 360" role="img" aria-label="Two 100-percent stacked bars showing the regional distribution of the world's Christians in 2010 and 2020 across six regions">
  <rect width="100%" height="100%" fill="#f7f6f2" />

  <line x1="160" y1="74" x2="720" y2="74" stroke="#d8d6d0" stroke-width="1" />
  <line x1="160" y1="132" x2="720" y2="132" stroke="#d8d6d0" stroke-width="1" />
  <line x1="160" y1="190" x2="720" y2="190" stroke="#d8d6d0" stroke-width="1" />
  <line x1="160" y1="248" x2="720" y2="248" stroke="#d8d6d0" stroke-width="1" />

  <text x="160" y="58" font-family="Geist Mono, monospace" font-size="10" fill="#999999">0%</text>
  <text x="272" y="58" text-anchor="middle" font-family="Geist Mono, monospace" font-size="10" fill="#999999">20%</text>
  <text x="384" y="58" text-anchor="middle" font-family="Geist Mono, monospace" font-size="10" fill="#999999">40%</text>
  <text x="496" y="58" text-anchor="middle" font-family="Geist Mono, monospace" font-size="10" fill="#999999">60%</text>
  <text x="608" y="58" text-anchor="middle" font-family="Geist Mono, monospace" font-size="10" fill="#999999">80%</text>
  <text x="720" y="58" text-anchor="end" font-family="Geist Mono, monospace" font-size="10" fill="#999999">100%</text>

  <text x="96" y="114" font-family="Geist Mono, monospace" font-size="12" fill="#1e1e1e">2010</text>
  <rect x="160" y="92" width="66.08" height="24" fill="#8c7a3a" />
  <rect x="226.08" y="92" width="144.48" height="24" fill="#1a3a5c" />
  <rect x="370.56" y="92" width="138.32" height="24" fill="#6b4a1a" />
  <rect x="508.88" y="92" width="2.8" height="24" fill="#8b2a2a" />
  <rect x="511.68" y="92" width="69.44" height="24" fill="#4a2e6b" />
  <rect x="581.12" y="92" width="138.88" height="24" fill="#3a6b50" />

  <text x="298.32" y="108" text-anchor="middle" font-family="Geist Mono, monospace" font-size="10" fill="#f7f6f2">Europe 25.8%</text>
  <text x="439.72" y="108" text-anchor="middle" font-family="Geist Mono, monospace" font-size="10" fill="#f7f6f2">LAC 24.7%</text>
  <text x="650.56" y="108" text-anchor="middle" font-family="Geist Mono, monospace" font-size="10" fill="#f7f6f2">SSA 24.8%</text>

  <text x="96" y="172" font-family="Geist Mono, monospace" font-size="12" fill="#1e1e1e">2020</text>
  <rect x="160" y="150" width="66.08" height="24" fill="#8c7a3a" />
  <rect x="226.08" y="150" width="124.88" height="24" fill="#1a3a5c" />
  <rect x="350.96" y="150" width="134.96" height="24" fill="#6b4a1a" />
  <rect x="485.92" y="150" width="3.36" height="24" fill="#8b2a2a" />
  <rect x="489.28" y="150" width="58.8" height="24" fill="#4a2e6b" />
  <rect x="548.08" y="150" width="171.92" height="24" fill="#3a6b50" />

  <text x="288.52" y="166" text-anchor="middle" font-family="Geist Mono, monospace" font-size="10" fill="#f7f6f2">Europe 22.3%</text>
  <text x="418.44" y="166" text-anchor="middle" font-family="Geist Mono, monospace" font-size="10" fill="#f7f6f2">LAC 24.1%</text>
  <text x="634.04" y="166" text-anchor="middle" font-family="Geist Mono, monospace" font-size="10" fill="#f7f6f2">SSA 30.7%</text>

  <text x="160" y="282" font-family="Geist Mono, monospace" font-size="10" fill="#999999">Asia-Pacific</text>
  <rect x="248" y="271" width="12" height="12" fill="#8c7a3a" />
  <text x="266" y="282" font-family="Geist Mono, monospace" font-size="10" fill="#999999">11.8% in both years</text>

  <text x="160" y="306" font-family="Geist Mono, monospace" font-size="10" fill="#999999">Europe</text>
  <rect x="248" y="295" width="12" height="12" fill="#1a3a5c" />
  <text x="266" y="306" font-family="Geist Mono, monospace" font-size="10" fill="#999999">25.8% to 22.3%</text>

  <text x="440" y="282" font-family="Geist Mono, monospace" font-size="10" fill="#999999">Latin America-Caribbean</text>
  <rect x="618" y="271" width="12" height="12" fill="#6b4a1a" />
  <text x="636" y="282" font-family="Geist Mono, monospace" font-size="10" fill="#999999">24.7% to 24.1%</text>

  <text x="440" y="306" font-family="Geist Mono, monospace" font-size="10" fill="#999999">Middle East-North Africa</text>
  <rect x="618" y="295" width="12" height="12" fill="#8b2a2a" />
  <text x="636" y="306" font-family="Geist Mono, monospace" font-size="10" fill="#999999">0.5% to 0.6%</text>

  <text x="160" y="330" font-family="Geist Mono, monospace" font-size="10" fill="#999999">North America</text>
  <rect x="248" y="319" width="12" height="12" fill="#4a2e6b" />
  <text x="266" y="330" font-family="Geist Mono, monospace" font-size="10" fill="#999999">12.4% to 10.5%</text>

  <text x="440" y="330" font-family="Geist Mono, monospace" font-size="10" fill="#999999">Sub-Saharan Africa</text>
  <rect x="618" y="319" width="12" height="12" fill="#3a6b50" />
  <text x="636" y="330" font-family="Geist Mono, monospace" font-size="10" fill="#999999">24.8% to 30.7%</text>
</svg>
