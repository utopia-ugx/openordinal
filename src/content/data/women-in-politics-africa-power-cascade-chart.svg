<svg xmlns="http://www.w3.org/2000/svg" width="860" height="420" viewBox="0 0 860 420" role="img" aria-label="Women's representation across eight positions in Africa 2024, from mayors at 30% down to party leadership at 9%" style="width:100%;height:auto;">
  <rect width="100%" height="100%" fill="var(--paper)"/>
  <line x1="220" y1="44" x2="220" y2="358" stroke="var(--rule)" stroke-width="1"/>
  <line x1="280" y1="44" x2="280" y2="358" stroke="var(--rule)" stroke-width="1" stroke-dasharray="4 6"/>
  <line x1="340" y1="44" x2="340" y2="358" stroke="var(--rule)" stroke-width="1" stroke-dasharray="4 6"/>
  <line x1="400" y1="44" x2="400" y2="358" stroke="var(--rule)" stroke-width="1" stroke-dasharray="4 6"/>
  <line x1="460" y1="44" x2="460" y2="358" stroke="var(--rule)" stroke-width="1" stroke-dasharray="4 6"/>
  <line x1="520" y1="44" x2="520" y2="358" stroke="var(--rule)" stroke-width="1" stroke-dasharray="4 6"/>
  <line x1="580" y1="44" x2="580" y2="358" stroke="var(--rule)" stroke-width="1" stroke-dasharray="4 6"/>
  <line x1="640" y1="44" x2="640" y2="358" stroke="var(--rule)" stroke-width="1" stroke-dasharray="4 6"/>
  <text x="215" y="68" text-anchor="end" font-family="Geist Mono, monospace" font-size="12" fill="var(--ink)">Mayors of capital cities</text>
  <rect x="220" y="52" width="360" height="24" fill="#1a3a5c"/>
  <text x="586" y="68" font-family="Geist Mono, monospace" font-size="12" fill="var(--dim)">30%</text>
  <text x="215" y="108" text-anchor="end" font-family="Geist Mono, monospace" font-size="12" fill="var(--ink)">Election management bodies</text>
  <rect x="220" y="92" width="348" height="24" fill="#1a3a5c"/>
  <text x="574" y="108" font-family="Geist Mono, monospace" font-size="12" fill="var(--dim)">29%</text>
  <text x="215" y="148" text-anchor="end" font-family="Geist Mono, monospace" font-size="12" fill="var(--ink)">Parliament (lower house)</text>
