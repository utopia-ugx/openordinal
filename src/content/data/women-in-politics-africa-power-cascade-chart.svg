  <rect x="220" y="172" width="300" height="24" fill="#1a3a5c"/>
  <text x="526" y="188" font-family="Geist Mono, monospace" font-size="12" fill="var(--dim)">25%</text>
  <text x="215" y="228" text-anchor="end" font-family="Geist Mono, monospace" font-size="12" fill="var(--ink)">Local government</text>
  <rect x="220" y="212" width="300" height="24" fill="#1a3a5c"/>
  <text x="526" y="228" font-family="Geist Mono, monospace" font-size="12" fill="var(--dim)">25%</text>
  <text x="215" y="268" text-anchor="end" font-family="Geist Mono, monospace" font-size="12" fill="var(--ink)">Cabinet</text>
  <rect x="220" y="252" width="288" height="24" fill="#1a3a5c"/>
  <text x="514" y="268" font-family="Geist Mono, monospace" font-size="12" fill="var(--dim)">24%</text>
  <text x="215" y="308" text-anchor="end" font-family="Geist Mono, monospace" font-size="12" fill="var(--ink)">Top executive positions</text>
  <rect x="220" y="292" width="156" height="24" fill="#1a3a5c"/>
