  <text x="520" y="376" text-anchor="middle" font-family="Geist Mono, monospace" font-size="11" fill="var(--dim)">25</text>
  <text x="580" y="376" text-anchor="middle" font-family="Geist Mono, monospace" font-size="11" fill="var(--dim)">30</text>
  <text x="640" y="376" text-anchor="middle" font-family="Geist Mono, monospace" font-size="11" fill="var(--dim)">35%</text>
