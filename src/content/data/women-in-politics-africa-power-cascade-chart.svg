  <rect x="220" y="332" width="108" height="24" fill="#8b2a2a"/>
  <text x="334" y="348" font-family="Geist Mono, monospace" font-size="12" fill="var(--dim)">9% ↓</text>
  <line x1="220" y1="358" x2="640" y2="358" stroke="var(--rule)" stroke-width="1"/>
