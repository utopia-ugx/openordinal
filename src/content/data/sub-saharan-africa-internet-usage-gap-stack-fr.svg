<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 860 264" role="img" aria-label="Decomposition en deux etapes de l'internet mobile en Afrique subsaharienne fin 2023">
  <rect width="100%" height="100%" fill="var(--paper)" />
  <text x="60" y="44" font-family="Geist Mono, monospace" font-size="11" fill="var(--dim)">Decomposition internet mobile ASS fin 2023</text>
  <line x1="60" y1="64" x2="800" y2="64" stroke="var(--rule)" stroke-width="1" />

  <text x="60" y="90" font-family="Geist Mono, monospace" font-size="10" fill="var(--dim)">1. La couverture atteint la plupart des gens</text>
  <rect x="60" y="102" width="643.8" height="34" rx="2" fill="#eadfce" stroke="#cdb79d" stroke-width="1" />
  <rect x="703.8" y="102" width="96.2" height="34" rx="2" fill="#8b2a2a" />
  <text x="381.9" y="123" text-anchor="middle" font-family="Geist Mono, monospace" font-size="11" fill="#5f5449">87% couverts</text>
  <text x="751.9" y="123" text-anchor="middle" font-family="Geist Mono, monospace" font-size="9.2" fill="#f7f6f2">13% hors couverture</text>

  <text x="60" y="160" font-family="Geist Mono, monospace" font-size="10" fill="var(--dim)">2. Dans les 87% couverts</text>

  <rect x="60" y="170" width="199.8" height="38" rx="2" fill="#1f5c3f" />
  <rect x="259.8" y="170" width="444" height="38" rx="2" fill="#c17f4a" />
  <rect x="703.8" y="170" width="96.2" height="38" rx="2" fill="none" stroke="var(--rule)" stroke-width="1" stroke-dasharray="5 4" />
  <text x="159.9" y="193" text-anchor="middle" font-family="Geist Mono, monospace" font-size="11" fill="#f7f6f2">27% en ligne</text>
  <text x="481.8" y="193" text-anchor="middle" font-family="Geist Mono, monospace" font-size="10.5" fill="#0f0f0f">60% couverts, sans usage</text>

  <text x="60" y="236" font-family="Geist Mono, monospace" font-size="11" fill="var(--ink)">710 millions de personnes en ASS vivaient dans la couverture sans utiliser l'internet mobile.</text>
</svg>
